name: Deploy Admin Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin-web/**'
      - '.github/workflows/deploy-admin.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "admin-pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build Admin Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/admin-web/package-lock.json

      - name: Install dependencies
        working-directory: apps/admin-web
        run: npm ci

      - name: Build
        working-directory: apps/admin-web
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_BASE_PATH: /EPI-Supervisor/admin/
        run: npm run build

      - name: Add 404.html for SPA routing
        working-directory: apps/admin-web/dist
        run: cp index.html 404.html

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-dashboard
          path: apps/admin-web/dist/
          retention-days: 30

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}/admin/
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: admin-dashboard
          path: _site/admin/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
