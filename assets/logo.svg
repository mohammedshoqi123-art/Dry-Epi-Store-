<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E88E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0D47A1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Shield background -->
  <g filter="url(#shadow)">
    <path d="M256 16 L480 100 L480 260 C480 380 380 460 256 496 C132 460 32 380 32 260 L32 100 Z"
          fill="url(#shieldGrad)" />
  </g>

  <!-- Inner shield highlight -->
  <path d="M256 48 L456 120 L456 256 C456 364 366 436 256 468 C146 436 56 364 56 256 L56 120 Z"
        fill="url(#innerGrad)" opacity="0.15" />

  <!-- Globe / World circle -->
  <circle cx="256" cy="230" r="100" fill="none" stroke="#1E88E5" stroke-width="6" opacity="0.6"/>
  <!-- Globe horizontal lines -->
  <ellipse cx="256" cy="210" rx="90" ry="30" fill="none" stroke="#1E88E5" stroke-width="3" opacity="0.4"/>
  <ellipse cx="256" cy="250" rx="90" ry="30" fill="none" stroke="#1E88E5" stroke-width="3" opacity="0.4"/>
  <!-- Globe vertical line -->
  <ellipse cx="256" cy="230" rx="30" ry="100" fill="none" stroke="#1E88E5" stroke-width="3" opacity="0.4"/>

  <!-- Syringe -->
  <g transform="translate(256, 230) rotate(-30)">
    <!-- Syringe body -->
    <rect x="-8" y="-70" width="16" height="90" rx="3" fill="#1565C0"/>
    <!-- Syringe needle -->
    <rect x="-3" y="-90" width="6" height="25" rx="2" fill="#90CAF9"/>
    <polygon points="-3,-90 3,-90 0,-105" fill="#90CAF9"/>
    <!-- Syringe plunger -->
    <rect x="-4" y="20" width="8" height="25" rx="2" fill="#0D47A1"/>
    <!-- Syringe flange -->
    <rect x="-14" y="18" width="28" height="6" rx="3" fill="#0D47A1"/>
    <!-- Dose marks -->
    <rect x="8" y="-50" width="6" height="2" fill="#1565C0" opacity="0.6"/>
    <rect x="8" y="-35" width="8" height="2" fill="#1565C0" opacity="0.6"/>
    <rect x="8" y="-20" width="6" height="2" fill="#1565C0" opacity="0.6"/>
  </g>

  <!-- Plus / Cross symbol -->
  <rect x="240" y="340" width="32" height="70" rx="6" fill="#1565C0"/>
  <rect x="222" y="358" width="68" height="32" rx="6" fill="#1565C0"/>

  <!-- Small stars decoration -->
  <circle cx="130" cy="150" r="6" fill="#FFC107" opacity="0.8"/>
  <circle cx="382" cy="150" r="6" fill="#FFC107" opacity="0.8"/>
  <circle cx="100" cy="200" r="4" fill="#FFC107" opacity="0.6"/>
  <circle cx="412" cy="200" r="4" fill="#FFC107" opacity="0.6"/>
</svg>
