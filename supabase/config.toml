# EPI Supervisor — Supabase Configuration
# https://supabase.com/docs/guides/local-development/cli/config

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false

# Edge Functions
[functions.submit-form]
verify_jwt = false

[functions.sync-offline]
verify_jwt = false

[functions.get-analytics]
verify_jwt = false

[functions.ai-chat]
verify_jwt = false

[functions.create-admin]
verify_jwt = false

[functions.admin-actions]
verify_jwt = false

[functions.get-dashboard-stats]
verify_jwt = false

[functions.get-governorate-report]
verify_jwt = false

# Analytics
[analytics]
enabled = false
