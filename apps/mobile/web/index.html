<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="منصة مشرف EPI - نظام إشراف ميداني لحملات التطعيم">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="مشرف EPI">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <title>منصة مشرف EPI</title>
  <script src="flutter_bootstrap.js" async></script>
</head>
<body>
  <script>
    window.addEventListener('error', function(e) {
      console.error('Flutter error:', e.message, e.filename, e.lineno);
      document.body.innerHTML = '<div style="padding:20px;font-family:sans-serif;color:red;">Error: ' + e.message + '<br>' + (e.filename || '') + ':' + e.lineno + '</div>';
    });
    window.addEventListener('unhandledrejection', function(e) {
      console.error('Flutter rejection:', e.reason);
      document.body.innerHTML = '<div style="padding:20px;font-family:sans-serif;color:red;">Promise error: ' + e.reason + '</div>';
    });
  </script>
</body>
</html>
