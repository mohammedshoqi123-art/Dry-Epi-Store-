name: epi_supervisor
description: EPI Supervisor Platform - Mobile App
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  epi_core:
    path: ../../packages/core
  epi_shared:
    path: ../../packages/shared
  epi_features:
    path: ../../packages/features

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.1.4

  # Supabase
  supabase_flutter: ^2.5.6

  # UI
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Offline
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.3

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  url_launcher: ^6.2.6
  image_picker: ^1.0.7
  permission_handler: ^11.3.1
  geolocator: ^12.0.0
  sentry_flutter: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
