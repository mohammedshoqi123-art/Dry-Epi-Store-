apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) flutterVersionCode = '1'

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) flutterVersionName = '1.0.0'

def flutterSdkPath = localProperties.getProperty('flutter.sdk')
if (flutterSdkPath == null) {
    flutterSdkPath = System.getenv("FLUTTER_SDK") ?: System.getenv("FLUTTER_ROOT")
}
apply from: "$flutterSdkPath/packages/flutter_tools/gradle/flutter.gradle"

// Load env variables for build (env vars take priority, then local.properties)
def supabaseUrl = System.getenv('SUPABASE_URL') ?: localProperties.getProperty('SUPABASE_URL') ?: ''
def supabaseAnonKey = System.getenv('SUPABASE_ANON_KEY') ?: localProperties.getProperty('SUPABASE_ANON_KEY') ?: ''
def geminiApiKey = System.getenv('GEMINI_API_KEY') ?: localProperties.getProperty('GEMINI_API_KEY') ?: ''
def sentryDsn = System.getenv('SENTRY_DSN') ?: localProperties.getProperty('SENTRY_DSN') ?: ''

android {
    namespace "com.epi.supervisor"
    compileSdkVersion 35
    ndkVersion "25.1.8937393"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.epi.supervisor"
        minSdkVersion 26
        targetSdkVersion 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName

        // Inject environment variables as build constants
        buildConfigField "String", "SUPABASE_URL", "\"${supabaseUrl}\""
        buildConfigField "String", "SUPABASE_ANON_KEY", "\"${supabaseAnonKey}\""
        buildConfigField "String", "GEMINI_API_KEY", "\"${geminiApiKey}\""
        buildConfigField "String", "SENTRY_DSN", "\"${sentryDsn}\""

        // Flutter dart-define equivalents
        resValue "string", "supabase_url", supabaseUrl
        resValue "string", "supabase_anon_key", supabaseAnonKey
    }

    // ═══════════════════════════════════════════════════════════════════
    // RELEASE SIGNING CONFIG
    // Priority: env vars (CI/CD) → local.properties (local dev)
    //
    // For LOCAL builds, add to local.properties:
    //   storeFile=/path/to/keystore.jks
    //   storePassword=your-store-password
    //   keyAlias=your-key-alias
    //   keyPassword=your-key-password
    //
    // For CI/CD (GitHub Actions), add these secrets:
    //   KEYSTORE_BASE64 — base64 of the .jks file
    //   KEYSTORE_PASSWORD
    //   KEY_ALIAS
    //   KEY_PASSWORD
    // ═══════════════════════════════════════════════════════════════════
    signingConfigs {
        release {
            // CI/CD: decode keystore from base64 secret
            if (System.getenv('KEYSTORE_BASE64')) {
                def keystoreDir = new File(project.buildDir, 'keystore')
                keystoreDir.mkdirs()
                def keystoreFile = new File(keystoreDir, 'release-keystore.jks')
                // Decode base64 to file
                keystoreFile.bytes = System.getenv('KEYSTORE_BASE64').decodeBase64()

                storeFile keystoreFile
                storePassword System.getenv('KEYSTORE_PASSWORD')
                keyAlias System.getenv('KEY_ALIAS')
                keyPassword System.getenv('KEY_PASSWORD')
            }
            // Local dev: read from local.properties
            else if (localProperties.getProperty('storeFile')) {
                storeFile new File(localProperties.getProperty('storeFile'))
                storePassword localProperties.getProperty('storePassword')
                keyAlias localProperties.getProperty('keyAlias')
                keyPassword localProperties.getProperty('keyPassword')
            }
            // No signing config available — will fallback to debug signing
        }
    }

    buildTypes {
        release {
            // ═══ FIX: Use release signing if available, fallback to debug ═══
            if (signingConfigs.release.storeFile?.exists()) {
                signingConfig signingConfigs.release
            } else {
                // ⚠️ WARNING: Using debug signing — NOT suitable for Play Store
                System.err.println("⚠️ WARNING: No release keystore found. Using debug signing. " +
                    "This APK CANNOT be uploaded to Google Play Store. " +
                    "Set up a release keystore in local.properties or CI secrets.")
                signingConfig signingConfigs.debug
            }

            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'

            buildConfigField "String", "SUPABASE_URL", "\"${supabaseUrl}\""
            buildConfigField "String", "SUPABASE_ANON_KEY", "\"${supabaseAnonKey}\""
        }

        debug {
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
            debuggable true
        }
    }

    buildFeatures {
        buildConfig true
    }

    // ═══ FIX: Replace deprecated lintOptions with lint ═══
    lint {
        checkReleaseBuilds true
        abortOnError false
        warningsAsErrors false
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    implementation 'com.google.android.play:core:1.10.3'
}

// Force AndroidX core to compatible version (fix lStar attribute error)
configurations.all {
    resolutionStrategy {
        force 'androidx.core:core:1.13.1'
        force 'androidx.core:core-ktx:1.13.1'
    }
}
